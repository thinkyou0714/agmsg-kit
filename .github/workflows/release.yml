name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert tag == VERSION == CHANGELOG section
        run: |
          ver="$(tr -d '[:space:]' < VERSION)"
          tag="${GITHUB_REF_NAME#v}"
          [ "$ver" = "$tag" ] || { echo "tag v$tag != VERSION $ver"; exit 1; }
          grep -q "^## \[$ver\]" CHANGELOG.md || { echo "CHANGELOG.md missing ## [$ver]"; exit 1; }

      - name: Smoke + safety
        run: |
          bash tests/smoke.sh
          bash tests/test_safety.sh

      - name: Extract release notes
        run: |
          ver="$(tr -d '[:space:]' < VERSION)"
          awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" {grab=1; next}
            grab && /^## \[/ {exit}
            grab {print}
          ' CHANGELOG.md > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
